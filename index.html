<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Loveland"/>
<meta name="theme-color" content="#1C1C1E"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="logo.png"/>
<title>Loveland</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
/* ═══ iOS DESIGN SYSTEM — Loveland ═══ */
:root{
  --p400:#34C759;--p500:#22C55E;--p600:#16A34A;--p700:#15803D;
  --pgrad:linear-gradient(135deg,#22C55E 0%,#16A34A 100%);
  --pshadow:0 4px 12px rgba(34,197,94,.30);
  --g50:#FAFAFA;--g100:#F5F5F7;--g200:#E5E5EA;--g300:#D1D1D6;
  --g400:#C7C7CC;--g500:#AEAEB2;--g600:#8E8E93;--g700:#636366;
  --g800:#48484A;--g900:#1C1C1E;
  --sl:#D1FAE5;--sd:#16A34A;
  --wl:#FEF3C7;--wd:#D97706;
  --dl:#FEE2E2;--dd:#DC2626;--db:#FF3B30;
  --il:#DBEAFE;--id:#1E40AF;
  --rsm:6px;--rmd:10px;--rlg:14px;--rxl:20px;
  --ssm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --smd:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.05);
  --slg:0 12px 32px rgba(0,0,0,.10),0 4px 8px rgba(0,0,0,.06);
  --sxl:0 24px 48px rgba(0,0,0,.14),0 8px 16px rgba(0,0,0,.08);
  --eout:cubic-bezier(0,0,.58,1);
  --espg:cubic-bezier(.34,1.56,.64,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Segoe UI','Helvetica Neue',Arial,sans-serif;
  background:linear-gradient(180deg,#FAFAFA 0%,#F5F5F7 100%);
  color:var(--g900);min-height:100vh;
  padding-bottom:env(safe-area-inset-bottom,0px);
  -webkit-font-smoothing:antialiased;
}
:focus-visible{outline:2px solid var(--p500);outline-offset:2px;}

/* ── LOGIN ── */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#F0FDF4 0%,#DCFCE7 50%,#F0F9FF 100%);padding:20px;}
.login-card{background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border:1px solid var(--g200);border-radius:var(--rxl);padding:40px 36px;width:100%;max-width:380px;box-shadow:var(--sxl);animation:fadeUp .4s var(--eout);}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo img{width:170px;height:auto;display:block;margin:0 auto 8px;}
.login-sub{font-size:.6875rem;font-weight:500;color:var(--g600);letter-spacing:.5px;text-transform:uppercase;}
.login-title{font-size:.9375rem;font-weight:600;color:var(--g800);text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--g200);}
.fld{margin-bottom:16px;}
.flabel{display:block;font-size:.8125rem;font-weight:500;color:var(--g900);margin-bottom:4px;}
.finput{width:100%;min-height:44px;padding:10px 14px;border:1.5px solid var(--g300);border-radius:var(--rmd);font-size:1rem;font-family:inherit;color:var(--g900);background:var(--g50);transition:border-color .15s,box-shadow .15s,background .15s;outline:none;}
.finput:focus{border-color:var(--p500);background:white;box-shadow:0 0 0 3px rgba(34,197,94,.15);}
.btn-primary{display:block;width:100%;min-height:44px;padding:12px 24px;background:var(--pgrad);color:white;border:none;border-radius:var(--rmd);font-size:.875rem;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:var(--pshadow);transition:transform .15s var(--eout),box-shadow .15s;margin-top:4px;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(34,197,94,.36);}
.btn-primary:active{transform:translateY(0);}
.login-err{background:var(--dl);color:var(--dd);border:1px solid #FECACA;border-radius:var(--rmd);padding:10px 14px;font-size:.8125rem;font-weight:500;text-align:center;margin-bottom:16px;}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:200;height:52px;background:rgba(28,28,30,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;padding:0 20px;box-shadow:0 1px 0 rgba(255,255,255,.04),var(--ssm);}
.hlogo img{height:28px;width:auto;filter:brightness(0) invert(1);display:block;}
.hright{display:flex;align-items:center;gap:12px;}
.huser{font-size:.75rem;color:rgba(255,255,255,.5);}
.hdiv{width:1px;height:14px;background:rgba(255,255,255,.12);}
.hmeta{font-size:.6875rem;color:rgba(255,255,255,.4);font-variant-numeric:tabular-nums;}
.btn-ghost{background:transparent;border:none;color:rgba(255,255,255,.55);font-size:.75rem;font-family:inherit;padding:5px 10px;border-radius:var(--rsm);cursor:pointer;min-height:32px;transition:color .15s,background .15s;}
.btn-ghost:hover{color:white;background:rgba(255,255,255,.08);}

/* ── TAB BAR (bottom iOS style) ── */
.tab-bar{position:sticky;top:52px;z-index:190;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--g200);display:flex;box-shadow:var(--ssm);}
.tab-btn{flex:1;min-height:44px;padding:0 4px;border:none;background:transparent;color:var(--g500);font-size:.8125rem;font-weight:500;font-family:inherit;cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;display:flex;align-items:center;justify-content:center;gap:5px;}
.tab-btn.active{color:var(--p600);border-bottom-color:var(--p600);font-weight:600;}
.tab-btn svg{width:15px;height:15px;}

/* ── MAIN ── */
.main{max-width:1360px;margin:0 auto;padding:20px 20px 32px;}
.tab-page{display:none;}.tab-page.active{display:block;animation:fadeUp .3s var(--eout);}

/* ── FILTER PANEL ── */
.filter-panel{background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border:1px solid var(--g200);border-radius:var(--rlg);padding:18px 20px;margin-bottom:18px;box-shadow:var(--ssm);}
.search-wrap{position:relative;margin-bottom:16px;}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--g500);pointer-events:none;}
.search-in{width:100%;min-height:44px;padding:10px 14px 10px 36px;border:1.5px solid var(--g300);border-radius:var(--rmd);font-size:.9375rem;font-family:inherit;color:var(--g900);background:var(--g50);transition:border-color .15s,box-shadow .15s,background .15s;outline:none;}
.search-in:focus{border-color:var(--p500);background:white;box-shadow:0 0 0 3px rgba(34,197,94,.12);}
.frow{margin-bottom:14px;}
.sec-title{font-size:.6875rem;font-weight:500;color:var(--g600);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:block;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{min-height:30px;padding:4px 14px;border:1.5px solid var(--g300);border-radius:100px;background:white;color:var(--g700);font-size:.75rem;font-weight:500;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all .15s var(--eout);display:inline-flex;align-items:center;}
.chip:hover{border-color:var(--p500);color:var(--p600);background:var(--sl);}
.chip.on{background:var(--pgrad);border-color:transparent;color:white;font-weight:600;box-shadow:0 2px 8px rgba(34,197,94,.28);}
.chip.soja.on{background:linear-gradient(135deg,#3B82F6,#1D4ED8);box-shadow:0 2px 8px rgba(59,130,246,.28);}
.chip.milho.on{background:linear-gradient(135deg,#F59E0B,#D97706);box-shadow:0 2px 8px rgba(245,158,11,.28);}
.ffoot{display:flex;align-items:center;justify-content:space-between;padding-top:14px;margin-top:4px;border-top:1px solid var(--g200);}
.btn-sec{min-height:38px;padding:8px 16px;background:var(--g100);color:var(--g700);border:1px solid var(--g300);border-radius:var(--rmd);font-size:.8125rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;}
.btn-sec:hover{background:var(--g200);border-color:var(--g400);}
.btn-add{min-height:38px;padding:8px 20px;background:var(--pgrad);color:white;border:none;border-radius:var(--rmd);font-size:.8125rem;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:var(--pshadow);transition:transform .15s,box-shadow .15s;}
.btn-add:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(34,197,94,.36);}

/* ── RESULTS BAR ── */
.rbar{margin-bottom:16px;}
.rcnt{font-size:.8125rem;color:var(--g600);font-variant-numeric:tabular-nums;}
.rcnt strong{color:var(--g900);font-weight:600;}

/* ── CARD GRID ── */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}

/* ── PRODUCT CARD ── */
.pcard{background:white;border:1px solid var(--g200);border-radius:var(--rlg);box-shadow:var(--ssm);overflow:hidden;display:flex;flex-direction:column;transition:transform .25s var(--eout),box-shadow .25s;animation:fadeUp .35s var(--eout) both;}
.pcard:hover{transform:translateY(-3px);box-shadow:var(--slg);}

/* photo carousel */
.photo-wrap{position:relative;width:72px;height:72px;flex-shrink:0;border-radius:var(--rmd);border:1px solid var(--g200);overflow:hidden;background:var(--g100);cursor:pointer;}
.photo-img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .2s;}
.photo-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;}
.photo-placeholder svg{width:20px;height:20px;color:var(--g400);}
.photo-placeholder span{font-size:.5625rem;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;}
.photo-hover{position:absolute;inset:0;background:rgba(22,163,74,.55);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;}
.photo-hover svg{width:18px;height:18px;color:white;}
.photo-wrap:hover .photo-hover{opacity:1;}
.photo-dot-row{position:absolute;bottom:4px;left:0;right:0;display:flex;justify-content:center;gap:3px;}
.photo-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.6);transition:background .15s;}
.photo-dot.on{background:white;}

.ctop{padding:16px 16px 12px;display:flex;gap:12px;align-items:flex-start;}
.cinfo{flex:1;min-width:0;}
.cname{font-size:.9375rem;font-weight:700;color:var(--g900);line-height:1.25;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ctype{font-size:.625rem;font-weight:500;color:var(--g600);text-transform:uppercase;letter-spacing:.5px;}
.cbtns{display:flex;gap:5px;}
.btn-ico{width:30px;height:30px;border:1.5px solid var(--g300);border-radius:var(--rsm);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.btn-ico svg{width:13px;height:13px;color:var(--g600);}
.btn-ico:hover{border-color:var(--p400);background:var(--sl);}
.btn-ico:hover svg{color:var(--p600);}
.btn-ico.d:hover{border-color:var(--db);background:var(--dl);}
.btn-ico.d:hover svg{color:var(--dd);}

.cbody{padding:0 16px 14px;flex:1;}
.cdesc{font-size:.8125rem;color:var(--g600);line-height:1.55;margin-bottom:10px;}
.nrow{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.npill{padding:2px 8px;border-radius:4px;font-size:.625rem;font-weight:700;letter-spacing:.3px;text-transform:uppercase;}
.spill{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:4px;font-size:.625rem;font-weight:500;color:var(--g600);background:var(--g100);border:1px solid var(--g200);margin-bottom:8px;}
.spill strong{font-weight:700;font-size:.5625rem;text-transform:uppercase;letter-spacing:.5px;margin-right:2px;color:var(--g700);}
.crow{display:flex;gap:5px;flex-wrap:wrap;}
.cbadge{padding:3px 8px;border-radius:4px;font-size:.625rem;font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
.cb-s{background:#DBEAFE;color:#1D4ED8;border:1px solid #BFDBFE;}
.cb-m{background:#FEF3C7;color:#B45309;border:1px solid #FDE68A;}
.cb-o{background:var(--g100);color:var(--g600);border:1px solid var(--g200);font-style:italic;font-weight:500;}

.cfoot{border-top:1px solid var(--g200);padding:9px 16px;background:var(--g50);display:flex;align-items:center;justify-content:space-between;}
.dprev{font-size:.75rem;color:var(--g600);}
.dprev strong{color:var(--g900);font-weight:600;font-variant-numeric:tabular-nums;}
.btn-exp{background:none;border:none;padding:3px 6px;border-radius:var(--rsm);font-size:.75rem;font-weight:600;color:var(--p600);font-family:inherit;cursor:pointer;transition:background .15s;}
.btn-exp:hover{background:var(--sl);}
.dtbl-wrap{padding:0 16px 14px;border-top:1px solid var(--g200);}
.dtbl{width:100%;border-collapse:collapse;font-size:.75rem;margin-top:10px;}
.dtbl th{text-align:left;font-size:.5625rem;font-weight:500;color:var(--g600);text-transform:uppercase;letter-spacing:.5px;padding:4px 6px;border-bottom:1px solid var(--g200);}
.dtbl td{padding:5px 6px;color:var(--g800);border-bottom:1px solid var(--g100);font-variant-numeric:tabular-nums;}
.dtbl tr:last-child td{border-bottom:none;}
.onote{font-size:.625rem;color:var(--g500);font-style:italic;margin-top:6px;}

/* empty */
.empty{text-align:center;padding:72px 24px;}
.empty h3{font-size:.9375rem;color:var(--g800);font-weight:600;margin-bottom:6px;}
.empty p{font-size:.8125rem;color:var(--g500);}

/* ── OVERLAY / MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:white;border-radius:var(--rxl);width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:var(--sxl);animation:slideUp .2s var(--espg);}
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhead{padding:20px 24px 16px;border-bottom:1px solid var(--g200);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:white;z-index:1;border-radius:var(--rxl) var(--rxl) 0 0;}
.mhead h3{font-size:.9375rem;font-weight:700;color:var(--g900);}
.btn-x{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--g300);background:var(--g100);cursor:pointer;font-size:15px;color:var(--g600);display:flex;align-items:center;justify-content:center;transition:all .15s;}
.btn-x:hover{background:var(--dl);border-color:var(--db);color:var(--dd);}
.mbody{padding:20px 24px 24px;}
.fg{margin-bottom:14px;}
.fl{display:block;font-size:.8125rem;font-weight:500;color:var(--g900);margin-bottom:4px;}
.fi,.fsel,.fta{width:100%;min-height:44px;padding:10px 12px;border:1.5px solid var(--g300);border-radius:var(--rmd);font-size:.9375rem;font-family:inherit;color:var(--g900);background:var(--g50);transition:border-color .15s,box-shadow .15s,background .15s;outline:none;}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--p500);background:white;box-shadow:0 0 0 3px rgba(34,197,94,.12);}
.fta{resize:vertical;min-height:72px;}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.sub-title{font-size:.6875rem;font-weight:500;color:var(--g600);text-transform:uppercase;letter-spacing:.5px;margin:18px 0 8px;display:flex;align-items:center;gap:8px;}
.sub-title::after{content:'';flex:1;height:1px;background:var(--g200);}
.chips-sel{display:flex;flex-wrap:wrap;gap:5px;}
.chips-sel .chip{min-height:28px;padding:3px 11px;font-size:.75rem;}
.img-row{display:flex;gap:12px;align-items:flex-start;}
.ithumb{width:60px;height:60px;border-radius:var(--rmd);border:1px solid var(--g300);background:var(--g100);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ithumb img{width:100%;height:100%;object-fit:cover;}
.ithumb svg{width:20px;height:20px;color:var(--g400);}
.iright{display:flex;flex-direction:column;gap:6px;}
.btn-upl{min-height:34px;padding:5px 14px;border:1.5px dashed var(--p400);border-radius:var(--rmd);background:var(--sl);color:var(--p600);font-size:.75rem;font-weight:500;font-family:inherit;cursor:pointer;transition:all .15s;}
.btn-upl:hover{background:#BBF7D0;border-color:var(--p600);}
.ihint{font-size:.625rem;color:var(--g500);}
.btn-rmv{background:none;border:1px solid var(--g300);color:var(--g500);border-radius:var(--rsm);padding:3px 8px;font-size:.6875rem;font-family:inherit;cursor:pointer;transition:all .15s;}
.btn-rmv:hover{border-color:var(--db);color:var(--dd);background:var(--dl);}
.doses-list{display:flex;flex-direction:column;gap:5px;}
.dose-hdr{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 26px;gap:5px;margin-bottom:2px;}
.dose-hdr span{font-size:.5625rem;font-weight:500;color:var(--g600);text-transform:uppercase;letter-spacing:.5px;}
.dose-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 26px;gap:5px;align-items:center;}
.dose-row .fi{min-height:34px;font-size:.75rem;padding:5px 8px;}
.btn-drm{width:26px;height:26px;border:none;background:none;color:var(--db);font-size:14px;cursor:pointer;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;transition:background .15s;}
.btn-drm:hover{background:var(--dl);}
.btn-dadd{min-height:34px;width:100%;margin-top:5px;border:1.5px dashed var(--g300);background:none;color:var(--g600);font-size:.75rem;font-family:inherit;border-radius:var(--rmd);cursor:pointer;transition:all .15s;}
.btn-dadd:hover{border-color:var(--p400);color:var(--p600);background:var(--sl);}
.mfoot{display:flex;gap:8px;justify-content:flex-end;padding-top:14px;margin-top:14px;border-top:1px solid var(--g200);}

/* confirm */
.conf-modal{max-width:340px;}
.conf-body{padding:28px 24px;text-align:center;}
.conf-body h3{font-size:.9375rem;font-weight:700;color:var(--g900);margin-bottom:6px;}
.conf-body p{font-size:.8125rem;color:var(--g600);line-height:1.55;margin-bottom:20px;}
.conf-act{display:flex;gap:8px;justify-content:center;}
.btn-dng{min-height:40px;padding:8px 22px;background:linear-gradient(135deg,#FF3B30 0%,#DC2626 100%);color:white;border:none;border-radius:var(--rmd);font-size:.8125rem;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:0 4px 12px rgba(255,59,48,.28);transition:transform .15s,box-shadow .15s;}
.btn-dng:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(255,59,48,.38);}

/* ── PLANO NUTRICIONAL ── */
.plan-section{max-width:900px;margin:0 auto;}
.pn-card{background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border:1px solid var(--g200);border-radius:var(--rlg);padding:18px 20px;margin-bottom:14px;box-shadow:var(--ssm);}
.pn-card .sec-title{margin-bottom:12px;}
.pn-fg{margin-bottom:14px;}
.pn-fg label{display:block;font-size:.8125rem;font-weight:500;color:var(--g900);margin-bottom:4px;}
.pn-in{width:100%;min-height:44px;padding:10px 12px;border:1.5px solid var(--g300);border-radius:var(--rmd);font-size:.9375rem;font-family:inherit;color:var(--g900);background:var(--g50);outline:none;transition:border-color .15s,box-shadow .15s,background .15s;}
.pn-in:focus{border-color:var(--p500);background:white;box-shadow:0 0 0 3px rgba(34,197,94,.12);}

/* ══════════════════════════════════════
   FOTO com carrossel automático
══════════════════════════════════════ */
function ProductPhoto({product, onUpload}){
  const [idx,setIdx]=useState(0);
  const [urls,setUrls]=useState([]);
  const [loaded,setLoaded]=useState([]);
  const ref=useRef();

  useEffect(()=>{
    const sl=toSlug(product.name);
    const candidates=[];
    // foto manual tem prioridade
    if(product.image) candidates.push({src:product.image,manual:true});
    // fotos automáticas do GitHub
    ['jpg','jpeg','png'].forEach(ext=>{
      candidates.push({src:`${IMG_BASE}${sl}.${ext}`,manual:false});
      candidates.push({src:`${IMG_BASE}${sl}-2.${ext}`,manual:false});
    });
    // também aceita capitalizado (PowerMicros.jpg)
    candidates.push({src:`${IMG_BASE}${product.name.replace(/\s+/g,'')}.jpg`,manual:false});
    candidates.push({src:`${IMG_BASE}${product.name.replace(/\s+/g,'')}-2.jpg`,manual:false});
    setUrls(candidates);
    setLoaded(new Array(candidates.length).fill(null));
    setIdx(0);
  },[product.name,product.image]);

  function handleLoad(i){setLoaded(prev=>{const n=[...prev];n[i]=true;return n;});}
  function handleError(i){setLoaded(prev=>{const n=[...prev];n[i]=false;return n;});}

  const valid=urls.map((u,i)=>loaded[i]===true?u:null).filter(Boolean);

  function pickImg(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>onUpload(product.id,ev.target.result);r.readAsDataURL(f);
  }

  const show=valid[idx];
  const total=valid.length;

  return(
    <div className="photo-wrap" onClick={()=>{
      if(total>1){setIdx(i=>(i+1)%total);}
      else{ref.current&&ref.current.click();}
    }}>
      {/* preload hidden imgs */}
      {urls.map((u,i)=>(
        <img key={u.src+i} src={u.src} alt="" style={{display:'none'}}
          onLoad={()=>handleLoad(i)} onError={()=>handleError(i)}/>
      ))}
      {show
        ? <img src={show.src} alt={product.name} className="photo-img"/>
        : <div className="photo-placeholder"><I.Image/><span>Foto</span></div>
      }
      <div className="photo-hover"><I.Camera/></div>
      {total>1&&(
        <div className="photo-dot-row">
          {valid.map((_,i)=><span key={i} className={`photo-dot${i===idx?' on':''}`}/>)}
        </div>
      )}
      <input ref={ref} type="file" accept="image/*" style={{display:'none'}} onChange={pickImg}/>
    </div>
  );
}

/* ══════════════════════════════════════
   PRODUCT CARD
══════════════════════════════════════ */
function PCard({p,onEdit,onDelete,onImg}){
  const [open,setOpen]=useState(false);
  const [doseVal,setDoseVal]=useState('');

  // Calcula g/ha para cada nutriente com composição cadastrada
  const calcResult = React.useMemo(()=>{
    const dose = parseFloat(doseVal);
    if(!dose || !p.nutComp || Object.keys(p.nutComp).length===0) return [];
    return Object.entries(p.nutComp)
      .filter(([,v])=>v && parseFloat(v)>0)
      .map(([nut,gPerUnit])=>{
        const gha = dose * parseFloat(gPerUnit);
        return {nut, gha};
      });
  },[doseVal, p.nutComp]);

  const hasComp = p.nutComp && Object.values(p.nutComp).some(v=>v && parseFloat(v)>0);

  return(
    <div className="pcard">
      <div className="ctop">
        <ProductPhoto product={p} onUpload={onImg}/>
        <div className="cinfo">
          <div className="cname">{p.name}</div>
          <div className="ctype">{p.type}</div>
        </div>
        <div className="cbtns">
          <button className="btn-ico" onClick={()=>onEdit(p)}><I.Edit/></button>
          <button className="btn-ico d" onClick={()=>onDelete(p)}><I.Trash/></button>
        </div>
      </div>
      <div className="cbody">
        <div className="cdesc">{p.description}</div>
        {p.nutrients?.length>0&&(
          <div className="nrow">
            {p.nutrients.map(n=>{
              const c=NP[n]||{bg:'#F5F5F7',tx:'#636366',bd:'#E5E5EA'};
              const g=p.nutComp?.[n];
              return(
                <span key={n} className="npill" style={{background:c.bg,color:c.tx,border:`1px solid ${c.bd}`}}>
                  {n}{g&&parseFloat(g)>0?<span style={{fontWeight:400,opacity:.75,marginLeft:3}}>{parseFloat(g)}g/{p.unidade||'L'}</span>:null}
                </span>
              );
            })}
          </div>
        )}
        {p.source&&<div className="spill"><strong>Fonte</strong>{p.source}</div>}
        <div className="crow">
          {p.cultures?.includes('soja')&&<span className="cbadge cb-s">Soja</span>}
          {p.cultures?.includes('milho')&&<span className="cbadge cb-m">Milho</span>}
          {p.cultures?.includes('outras')&&<span className="cbadge cb-o">Outras *</span>}
        </div>
      </div>

      {/* ── CALCULADORA DE DOSE ── */}
      {hasComp&&(
        <div className="dose-calc">
          <div className="dose-calc-row">
            <span className="dose-calc-label">Calcular dose:</span>
            <input
              className="dose-calc-in"
              type="number" min="0" step="0.1"
              placeholder="0"
              value={doseVal}
              onChange={e=>setDoseVal(e.target.value)}
            />
            <span className="dose-calc-unit">{p.unidade||'L'}/ha</span>
          </div>
          {calcResult.length>0&&doseVal&&(
            <div className="dose-result">
              {calcResult.map(({nut,gha})=>{
                const c=NP[nut]||{bg:'#F5F5F7',tx:'#636366',bd:'#E5E5EA'};
                return(
                  <span key={nut} className="dose-result-pill" style={{background:c.bg,color:c.tx,border:`1px solid ${c.bd}`}}>
                    {nut} {gha%1===0?gha:gha.toFixed(2)} <span>g/ha</span>
                  </span>
                );
              })}
            </div>
          )}
        </div>
      )}

      {p.doses?.length>0&&(
        <div className="cfoot">
          <div className="dprev"><strong>{p.doses[0].dose}</strong> — {p.doses[0].estadio}</div>
          <button className="btn-exp" onClick={()=>setOpen(!open)}>{open?'Ocultar':'Ver doses'}</button>
        </div>
      )}
      {open&&p.doses?.length>0&&(
        <div className="dtbl-wrap">
          <table className="dtbl">
            <thead><tr><th>Cultura</th><th>Modo</th><th>Dose</th><th>Estádio</th></tr></thead>
            <tbody>{p.doses.map((d,i)=><tr key={i}><td>{d.cultura}</td><td>{d.modo}</td><td>{d.dose}</td><td>{d.estadio}</td></tr>)}</tbody>
          </table>
          {p.cultures?.includes('outras')&&<div className="onote">* Recomendação para outras culturas mediante consulta técnica.</div>}
        </div>
      )}
    </div>
  );
}

function TabCatalogo({prods,setProds}){
  const [search,setSearch]=useState('');
  const [fNut,setFNut]=useState([]);
  const [fType,setFType]=useState([]);
  const [fCult,setFCult]=useState([]);
  const [modal,setModal]=useState(null);
  const [del,setDel]=useState(null);

  function togF(a,s,v){s(x=>x.includes(v)?x.filter(i=>i!==v):[...x,v]);}
  function clear(){setSearch('');setFNut([]);setFType([]);setFCult([]);}
  const active=fNut.length+fType.length+fCult.length+(search?1:0);

  const filtered=prods.filter(p=>{
    const q=search.toLowerCase();
    if(q&&!p.name.toLowerCase().includes(q)&&!p.description?.toLowerCase().includes(q))return false;
    if(fNut.length&&!fNut.every(n=>p.nutrients?.includes(n)))return false;
    if(fType.length&&!fType.includes(p.type))return false;
    if(fCult.length&&!fCult.some(c=>p.cultures?.includes(c)))return false;
    return true;
  });

  function handleSave(prod){setProds(prev=>{const i=prev.findIndex(x=>x.id===prod.id);if(i>=0){const n=[...prev];n[i]=prod;return n;}return[...prev,prod];});setModal(null);}

  return(
    <>
      <div className="filter-panel">
        <div className="search-wrap">
          <span className="search-ico"><I.Search/></span>
          <input className="search-in" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar produto por nome ou descrição..."/>
        </div>
        <div className="frow"><span className="sec-title">Nutriente</span><div className="chips">{NUTS_ALL.map(n=><span key={n} className={`chip${fNut.includes(n)?' on':''}`} onClick={()=>togF(fNut,setFNut,n)}>{n}</span>)}</div></div>
        <div className="frow"><span className="sec-title">Tipo</span><div className="chips">{TYPES_ALL.map(t=><span key={t} className={`chip${fType.includes(t)?' on':''}`} onClick={()=>togF(fType,setFType,t)}>{t}</span>)}</div></div>
        <div className="frow"><span className="sec-title">Cultura</span><div className="chips">
          <span className={`chip soja${fCult.includes('soja')?' on':''}`} onClick={()=>togF(fCult,setFCult,'soja')}>Soja</span>
          <span className={`chip milho${fCult.includes('milho')?' on':''}`} onClick={()=>togF(fCult,setFCult,'milho')}>Milho</span>
          <span className={`chip${fCult.includes('outras')?' on':''}`} onClick={()=>togF(fCult,setFCult,'outras')}>Outras</span>
        </div></div>
        <div className="ffoot">
          <button className="btn-sec" onClick={clear}>{active>0?`Limpar (${active})`:'Limpar filtros'}</button>
          <button className="btn-add" onClick={()=>setModal({p:null})}>Novo Produto</button>
        </div>
      </div>
      <div className="rbar"><span className="rcnt"><strong>{filtered.length}</strong> de {prods.length} produtos{active>0&&` · ${active} filtro${active>1?'s':''} ativo${active>1?'s':''}`}</span></div>
      {filtered.length===0
        ?<div className="empty"><h3>Nenhum produto encontrado</h3><p>Ajuste os filtros ou adicione um novo produto.</p></div>
        :<div className="cgrid">{filtered.map(p=><PCard key={p.id} p={p} onEdit={p=>setModal({p})} onDelete={p=>setDel(p)} onImg={(id,img)=>setProds(prev=>prev.map(x=>x.id===id?{...x,image:img}:x))}/>)}</div>
      }
      {modal&&<PModal product={modal.p} onSave={handleSave} onClose={()=>setModal(null)}/>}
      {del&&<Confirm p={del} onOk={()=>{setProds(prev=>prev.filter(x=>x.id!==del.id));setDel(null);}} onCancel={()=>setDel(null)}/>}
    </>
  );
}

/* ══════════════════════════════════════
   PLANO NUTRICIONAL TAB
══════════════════════════════════════ */
function TabPlano({prods}){
  const [cliente,setCliente]=useState(()=>load('pn_cli',''));
  const [cultura,setCultura]=useState(()=>load('pn_cult',''));
  const [targets,setTargets]=useState([]);
  const [addedProds,setAddedProds]=useState([]);
  const [nutSel,setNutSel]=useState('');
  const [prodSel,setProdSel]=useState('');
  const consultorInfo=load('pn_consultor',{nome:'',telefone:''});
  const [cNome,setCNome]=useState(consultorInfo.nome);
  const [cTel,setCTel]=useState(consultorInfo.telefone);

  useEffect(()=>{persist('pn_cli',cliente);},[cliente]);
  useEffect(()=>{persist('pn_cult',cultura);},[cultura]);

  function addTarget(nut){
    if(!nut)return;
    if(targets.find(t=>t.nut===nut)){setNutSel('');return;}
    setTargets(t=>[...t,{nut,val:''}]);setNutSel('');
  }
  function addProd(nome){
    if(!nome)return;
    const p=prods.find(x=>x.name===nome);
    if(!p){setProdSel('');return;}
    setAddedProds(a=>[...a,{id:Date.now(),name:p.name,dose:'',active:true,data:p}]);
    setProdSel('');
  }
  function calcular(){
    const alvos={};targets.forEach(t=>{if(t.val)alvos[t.nut]=parseFloat(t.val)||0;});
    const entregue={};
    addedProds.forEach(ap=>{
      if(!ap.active||!ap.dose)return;
      const dose=parseFloat(ap.dose)||0;
      NUTS_PN.forEach(n=>{
        const v=ap.data[n];if(v&&dose>0){entregue[n]=(entregue[n]||0)+dose*v;}
      });
    });
    return{alvos,entregue};
  }
  const {alvos,entregue}=calcular();

  function exportPDF(){
    const el=document.getElementById('pn-print-area');
    if(!el)return;
    const opt={margin:10,filename:'Plano_Nutricional.pdf',image:{type:'jpeg',quality:.98},html2canvas:{scale:3},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}};
    window.html2pdf().set(opt).from(el).save();
  }

  function saveConsultor(){persist('pn_consultor',{nome:cNome,telefone:cTel});}

  return(
    <>
      <div id="pn-print-area" className="plan-section">
        <div className="pn-card">
          <div className="sec-title">Informações do Cliente</div>
          <div className="pn-fg"><label>Cliente</label><input className="pn-in" value={cliente} onChange={e=>setCliente(e.target.value)} placeholder="Nome do produtor"/></div>
          <div className="pn-fg"><label>Cultura</label><input className="pn-in" value={cultura} onChange={e=>setCultura(e.target.value)} placeholder="Ex: Soja, Milho"/></div>
        </div>

        <div className="pn-card no-print">
          <div className="sec-title">Nutrientes Alvo (g/ha)</div>
          <select className="pn-sel" value={nutSel} onChange={e=>{setNutSel(e.target.value);addTarget(e.target.value);}}>
            <option value="">+ Adicionar nutriente</option>
            {NUTS_PN.map(n=><option key={n} value={n}>{n}</option>)}
          </select>
          {targets.length>0?(
            <table className="pn-tbl" style={{marginTop:12}}>
              <thead><tr><th>Nutriente</th><th style={{textAlign:'center'}}>Alvo (g/ha)</th><th style={{width:36}}></th></tr></thead>
              <tbody>{targets.map((t,i)=>(
                <tr key={t.nut}>
                  <td style={{fontWeight:600}}>{t.nut}</td>
                  <td style={{textAlign:'center'}}><input className="pn-in pn-in-sm" type="number" min="0" step="0.1" value={t.val} onChange={e=>setTargets(prev=>prev.map((x,j)=>j===i?{...x,val:e.target.value}:x))}/></td>
                  <td><button className="pn-rmv" onClick={()=>setTargets(prev=>prev.filter((_,j)=>j!==i))}>×</button></td>
                </tr>
              ))}</tbody>
            </table>
          ):<div className="pn-empty">Nenhum nutriente adicionado</div>}
        </div>

        <div className="pn-card no-print">
          <div className="sec-title">Produtos</div>
          <select className="pn-sel" value={prodSel} onChange={e=>{setProdSel(e.target.value);addProd(e.target.value);}}>
            <option value="">+ Adicionar produto</option>
            {prods.map(p=><option key={p.id} value={p.name}>{p.name}</option>)}
          </select>
          {addedProds.length>0?(
            <table className="pn-tbl" style={{marginTop:12}}>
              <thead><tr><th style={{width:40,textAlign:'center'}}>Usar</th><th>Produto</th><th style={{textAlign:'center',width:110}}>Dose</th><th style={{width:36}}></th></tr></thead>
              <tbody>{addedProds.map((ap,i)=>(
                <tr key={ap.id}>
                  <td style={{textAlign:'center'}}><input type="checkbox" className="pn-chk" checked={ap.active} onChange={e=>setAddedProds(prev=>prev.map((x,j)=>j===i?{...x,active:e.target.checked}:x))}/></td>
                  <td>
                    <span style={{fontWeight:600}}>{ap.name}</span>
                    {ap.data.type==='macro-fisiologico'&&<span className="pn-badge-macro">Macro</span>}
                    <div style={{marginTop:4,display:'flex',flexWrap:'wrap',gap:3}}>
                      {NUTS_PN.map(n=>ap.data[n]?<span key={n} className="pn-chip">{n}: {ap.data[n]}</span>:null)}
                    </div>
                  </td>
                  <td style={{textAlign:'center'}}>
                    <input className="pn-in pn-in-sm" type="number" min="0" step="0.1" value={ap.dose} onChange={e=>setAddedProds(prev=>prev.map((x,j)=>j===i?{...x,dose:e.target.value}:x))}/>
                    <div style={{fontSize:'.625rem',color:'var(--g600)',marginTop:3}}>{ap.data.unidade||'L/ha'}</div>
                  </td>
                  <td><button className="pn-rmv" onClick={()=>setAddedProds(prev=>prev.filter((_,j)=>j!==i))}>×</button></td>
                </tr>
              ))}</tbody>
            </table>
          ):<div className="pn-empty">Nenhum produto adicionado</div>}
        </div>

        <div className="pn-card">
          <div className="sec-title">Resultado do Plano</div>
          {Object.keys(alvos).length===0
            ?<div className="pn-empty">Adicione nutrientes e produtos para ver o resultado</div>
            :<table className="pn-tbl">
              <thead><tr><th>Nutriente</th><th style={{textAlign:'right'}}>Alvo</th><th style={{textAlign:'right'}}>Entregue</th><th style={{textAlign:'right'}}>Excesso</th><th style={{textAlign:'center',width:50}}>Status</th></tr></thead>
              <tbody>{Object.keys(alvos).map(nut=>{
                const alvo=alvos[nut];const entr=entregue[nut]||0;
                const pct=alvo>0?entr/alvo:0;
                const exc=entr-alvo;
                let cls='result-neutral',dot='dot-neutral';
                if(alvo>0){if(pct>=1){cls='result-ok';dot='dot-ok';}else if(pct>=.8){cls='result-warn';dot='dot-warn';}else{cls='result-bad';dot='dot-bad';}}
                return(
                  <tr key={nut} className={cls}>
                    <td style={{fontWeight:600}}>{nut}</td>
                    <td style={{textAlign:'right',fontVariantNumeric:'tabular-nums'}}>{alvo.toFixed(1)} g/ha</td>
                    <td style={{textAlign:'right',fontVariantNumeric:'tabular-nums'}}>{entr.toFixed(1)} g/ha</td>
                    <td style={{textAlign:'right',fontWeight:600,color:exc>=0?'var(--sd)':'var(--dd)',fontVariantNumeric:'tabular-nums'}}>{exc>=0?'+':''}{exc.toFixed(1)} g/ha</td>
                    <td style={{textAlign:'center'}}><span className={`status-dot ${dot}`}/></td>
                  </tr>
                );
              })}</tbody>
            </table>
          }
        </div>
      </div>

      <button className="pn-fab no-print" onClick={exportPDF} title="Exportar PDF"><I.PDF/></button>

      <footer className="pn-footer no-print">
        <div className="pnf-inner">
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <input type="text" className="pnf-name" value={cNome} onChange={e=>setCNome(e.target.value)} onBlur={saveConsultor} placeholder="Seu nome"/>
            <div className="pnf-sep"/>
            <span className="pnf-tag">Consultor Técnico</span>
          </div>
          <input type="text" className="pnf-ph" value={cTel} onChange={e=>setCTel(e.target.value)} onBlur={saveConsultor} placeholder="(00) 00000-0000"/>
        </div>
      </footer>
    </>
  );
}

/* ══════════════════════════════════════
   ADMIN PRODUTOS TAB
══════════════════════════════════════ */
function TabAdmin({prods,setProds}){
  const [modal,setModal]=useState(null);
  const [del,setDel]=useState(null);
  function handleSave(prod){setProds(prev=>{const i=prev.findIndex(x=>x.id===prod.id);if(i>=0){const n=[...prev];n[i]=prod;return n;}return[...prev,prod];});setModal(null);}
  return(
    <>
      <div className="admin-section">
        <div className="pn-card">
          <div className="adm-hdr">
            <span className="adm-hdr-title">Produtos Cadastrados — {prods.length} total</span>
            <button className="btn-add" onClick={()=>setModal({p:null})}>Novo Produto</button>
          </div>
          {prods.length===0
            ?<div className="pn-empty">Nenhum produto cadastrado</div>
            :<table className="adm-tbl">
              <thead><tr><th>Produto</th><th>Composição</th><th style={{textAlign:'right',width:130}}>Ações</th></tr></thead>
              <tbody>{prods.map(p=>(
                <tr key={p.id}>
                  <td>
                    <div style={{fontWeight:600,marginBottom:2}}>{p.name}</div>
                    <div style={{fontSize:'.6875rem',color:'var(--g600)'}}>{p.type}</div>
                  </td>
                  <td>
                    <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
                      {p.nutrients?.map(n=>{const c=NP[n]||{bg:'#F5F5F7',tx:'#636366',bd:'#E5E5EA'};return<span key={n} className="npill" style={{background:c.bg,color:c.tx,border:`1px solid ${c.bd}`,fontSize:'.5625rem',padding:'1px 6px'}}>{n}</span>;})}
                    </div>
                    {p.source&&<div style={{fontSize:'.6875rem',color:'var(--g600)',marginTop:4}}>{p.source}</div>}
                  </td>
                  <td>
                    <div className="act-row">
                      <button className="btn-edit" onClick={()=>setModal({p})}>Editar</button>
                      <button className="btn-del2" onClick={()=>setDel(p)}>Excluir</button>
                    </div>
                  </td>
                </tr>
              ))}</tbody>
            </table>
          }
        </div>
      </div>
      {modal&&<PModal product={modal.p} onSave={handleSave} onClose={()=>setModal(null)}/>}
      {del&&<Confirm p={del} onOk={()=>{setProds(prev=>prev.filter(x=>x.id!==del.id));setDel(null);}} onCancel={()=>setDel(null)}/>}
    </>
  );
}

/* ══════════════════════════════════════
   APP ROOT
══════════════════════════════════════ */
function App(){
  const [user,setUser]=useState(()=>sessionStorage.getItem('lv_u')||'');
  const [prods,setProds]=useState(()=>load('lv_ios_v8',INITIAL));
  const [tab,setTab]=useState('catalogo');

  useEffect(()=>{persist('lv_ios_v8',prods);},[prods]);
  function login(u){sessionStorage.setItem('lv_u',u);setUser(u);}
  function logout(){sessionStorage.removeItem('lv_u');setUser('');}

  if(!user)return<Login onLogin={login}/>;

  return(
    <>
      <header className="header">
        <div className="hlogo"><img src={LOGO_URL} alt="Loveland Products"/></div>
        <div className="hright">
          <span className="huser">{user}</span>
          <div className="hdiv"/>
          <span className="hmeta">{prods.length} produtos</span>
          <div className="hdiv"/>
          <button className="btn-ghost" onClick={logout}>Sair</button>
        </div>
      </header>

      <nav className="tab-bar">
        <button className={`tab-btn${tab==='catalogo'?' active':''}`} onClick={()=>setTab('catalogo')}>
          <I.Grid/> Catálogo
        </button>
        <button className={`tab-btn${tab==='plano'?' active':''}`} onClick={()=>setTab('plano')}>
          <I.Chart/> Plano Nutricional
        </button>
        <button className={`tab-btn${tab==='admin'?' active':''}`} onClick={()=>setTab('admin')}>
          <I.Settings/> Produtos
        </button>
      </nav>

      <main className="main">
        <div className={`tab-page${tab==='catalogo'?' active':''}`}><TabCatalogo prods={prods} setProds={setProds}/></div>
        <div className={`tab-page${tab==='plano'?' active':''}`}>{tab==='plano'&&<TabPlano prods={prods}/>}</div>
        <div className={`tab-page${tab==='admin'?' active':''}`}>{tab==='admin'&&<TabAdmin prods={prods} setProds={setProds}/>}</div>
      </main>
    </>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));

/* ── PWA Service Worker ── */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>
